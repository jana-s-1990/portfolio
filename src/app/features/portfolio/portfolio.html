<div class="section-intro">
  <app-headline>{{ 'portfolio.headline' | transloco }}</app-headline>
  <div class="section-intro_text">
    <app-info-text size="large" position="center">{{
      'portfolio.intro' | transloco
    }}</app-info-text>
  </div>
</div>
<div class="portfolio__projects">
  <app-project-card
    projectNumber="01/04"
    title="Join"
    [technologies]="['Angular', 'TypeScript', 'HTML', 'CSS', 'Firebase']"
    [description]="'portfolio.projects.join.description' | transloco"
    headlinePosition="right"
    textPosition="right"
    imageSrc="/assets/img/projects/join-project.png"
    [imageAlt]="'portfolio.projects.join.imageAlt' | transloco"
    imagePosition="left"
    [imageWidth]="620"
    [imageHeight]="393"
    buttonPosition="right"
    [buttonLabel]="'portfolio.github' | transloco"
    buttonHref="https://github.com/jana-s-1990"
    buttonTarget="_blank"
  />

  <app-project-card
    projectNumber="02/04"
    title="Sharkie"
    [technologies]="['JavaScript', 'HTML', 'CSS']"
    [description]="'portfolio.projects.sharkie.description' | transloco"
    textPosition="left"
    imageSrc="/assets/img/projects/sharkie-project.png"
    [imageAlt]="'portfolio.projects.sharkie.imageAlt' | transloco"
    imagePosition="right"
    [imageWidth]="620"
    [imageHeight]="393"
    [buttonLabel]="'portfolio.github' | transloco"
    buttonHref="https://github.com/jana-s-1990"
    buttonTarget="_blank"
  />

  <app-project-card
    projectNumber="03/04"
    title="Join"
    [technologies]="['Angular', 'TypeScript', 'HTML', 'CSS', 'Firebase']"
    [description]="'portfolio.projects.pokedex.description' | transloco"
    headlinePosition="right"
    textPosition="right"
    imageSrc="/assets/img/projects/pokedex-project.png"
    [imageAlt]="'portfolio.projects.pokedex.imageAlt' | transloco"
    imagePosition="left"
    [imageWidth]="620"
    [imageHeight]="393"
    buttonPosition="right"
    [buttonLabel]="'portfolio.github' | transloco"
    buttonHref="https://github.com/jana-s-1990"
    buttonTarget="_blank"
  />
</div>
