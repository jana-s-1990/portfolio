<div class="skills-frame">
  <app-headline class="skills-title">{{ 'skills.headline' | transloco }}</app-headline>

  <div class="skills-wrapper">
    <app-skill
      src="/assets/img/icons/ico_angular.svg"
      alt="Angular"
      technologieName="Angular"
    ></app-skill>
    <app-skill
      src="/assets/img/icons/ico_typescript.svg"
      alt="TypeScript"
      technologieName="TypeScript"
    ></app-skill>
    <app-skill
      src="/assets/img/icons/ico_javaScript.svg"
      alt="JavaScript"
      technologieName="JavaScript"
    ></app-skill>
    <app-skill
      src="/assets/img/icons/ico_html.svg"
      alt="HTML"
      technologieName="HTML"
    ></app-skill>
    <app-skill
      src="/assets/img/icons/ico_css.svg"
      alt="CSS"
      technologieName="CSS"
    ></app-skill>
    <app-skill
      src="/assets/img/icons/ico_supabase.svg"
      alt="Supabase"
      technologieName="Supabase"
    ></app-skill>
    <app-skill
      src="/assets/img/icons/ico_git.svg"
      alt="Git"
      technologieName="Git"
    ></app-skill>
    <app-skill
      src="/assets/img/icons/ico_api.svg"
      alt="REST-API"
      technologieName="REST-API"
    ></app-skill>
    <app-skill
      src="/assets/img/icons/ico_scrum.svg"
      alt="Scrum"
      technologieName="Scrum"
    ></app-skill>
    <app-skill
      src="/assets/img/icons/ico_material_design.svg"
      alt="Material Design"
      technologieName="Material Design"
    ></app-skill>
  </div>

  <div class="skills-learning">
    <img
      class="skills-learning__icon"
      src="/assets/img/icons/ico_learning.svg"
      alt=""
      width="80"
      height="80"
    />

    <div class="skills-learning__text">
      <span>{{ 'skills.missing' | transloco }}</span>
      <a href="#contact">{{ 'skills.contact' | transloco }}</a>
      <span>{{ 'skills.learning' | transloco }}</span>
    </div>
  </div>
</div>
