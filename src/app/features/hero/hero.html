<div class="hero-wrapper">
  <div class="hero-wrapper-headline">
    <h1>
      {{ 'hero.titleFirst' | transloco }}<br />
      {{ 'hero.titleSecond' | transloco }}
    </h1>
    <div class="hero-headline-subheadline">
      <span></span>
      <p>Jana Schaaf</p>
    </div>
  </div>

  <div class="hero__email">
    <a href="mailto:janaschaaf@icloud.com" [title]="'hero.emailTitle' | transloco"
      >janaschaaf&#64;icloud.com</a
    >
  </div>

  <div class="hero__scroll-down" [attr.aria-label]="'hero.scrollLabel' | transloco">
    <div class="hero__scroll-arrow-window" aria-hidden="true">
      <img
        class="hero__scroll-arrow"
        src="assets/img/icons/ico-arrow-scrollDown.svg"
        alt=""
      />
    </div>
    <div class="hero__scroll-label">
      <span>{{ 'hero.scrollFirst' | transloco }}</span>
      <span>{{ 'hero.scrollSecond' | transloco }}</span>
    </div>
  </div>
</div>
