<div class="contact">
  <app-headline position="left" [contact]=true>Say Hi!</app-headline>

  <div class="contact__intro">
    <h3 class="contact-headline">Want to discuss a new project?</h3>
    <app-info-text size="large" position="center" [contact]=true>Say hello! Let's discuss your ideas and make it happen.</app-info-text
    >
  </div>

  <app-contact-form />

  <a class="contact__back-to-top" href="#top" aria-label="Back to top">
    <svg
      class="contact__back-to-top-arrow"
      width="54"
      height="79"
      viewBox="0 0 54 79"
      fill="none"
      aria-hidden="true"
    >
      <path class="contact__back-to-top-head" d="M44.8525 16.6724L26.9263 2.54615L9.00011 16.6724" />
      <path class="contact__back-to-top-shaft" d="M27.1475 78.5459L27.1475 2.54589" />
    </svg>
  </a>
</div>
