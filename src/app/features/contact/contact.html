<div class="contact">
  <app-headline position="left" [contact]="true">{{ 'contact.sectionHeadline' | transloco }}</app-headline>

  <div class="contact__intro">
    <h3 class="contact-headline">{{ 'contact.headline' | transloco }}</h3>
    <app-info-text size="large" position="center" [contact]="true">
      {{ 'contact.intro' | transloco }}
    </app-info-text>
  </div>

  <app-contact-form />

  <a
    class="contact__back-to-top"
    href="#top"
    [attr.aria-label]="'contact.backToTop' | transloco"
  >
    <svg
      class="contact__back-to-top-arrow"
      width="54"
      height="79"
      viewBox="0 0 54 79"
      fill="none"
      aria-hidden="true"
    >
      <path class="contact__back-to-top-head" d="M44.8525 16.6724L26.9263 2.54615L9.00011 16.6724" />
      <path class="contact__back-to-top-shaft" d="M27.1475 78.5459L27.1475 2.54589" />
    </svg>
  </a>
</div>
