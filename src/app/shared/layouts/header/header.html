<header class="header" (keydown.escape)="closeMenu()">
  <div class="header__inner">
    <a class="header__logo" href="#home" aria-label="Back to the top" (click)="closeMenu()">
      [SE.]
    </a>

    <div class="header__actions">
      <div class="header__languages" aria-label="Available languages">
        <span class="header__language header__language--active">EN</span>
        <span class="header__language">DE</span>
      </div>

      <button
        class="header__menu-button"
        type="button"
        aria-controls="primary-navigation"
        [attr.aria-expanded]="menuOpen()"
        [attr.aria-label]="menuOpen() ? 'Close navigation' : 'Open navigation'"
        [class.header__menu-button--open]="menuOpen()"
        (click)="toggleMenu()"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <nav
      id="primary-navigation"
      class="header__nav"
      aria-label="Primary navigation"
      [attr.aria-hidden]="!menuOpen()"
      [attr.inert]="menuOpen() ? null : ''"
      [class.header__nav--open]="menuOpen()"
    >
      <div class="header__nav-links">
        <a href="#about" (click)="closeMenu()">About me</a>
        <a href="#skills" (click)="closeMenu()">My skills</a>
        <a href="#portfolio" (click)="closeMenu()">Portfolio</a>
      </div>

      <div class="header__contact">
        <div class="header__contact-copy">
          <a class="header__contact-title" href="mailto:sefan@gmail.com">Say Hi!</a>
          <a class="header__contact-mail" href="mailto:sefan@gmail.com">sefan@gmail.com</a>
        </div>

        <div class="header__socials" aria-label="Social links">
          <a href="https://github.com/" target="_blank" rel="noreferrer" aria-label="GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 .7a11.5 11.5 0 0 0-3.6 22.4c.6.1.8-.2.8-.6v-2.2c-3.4.7-4.1-1.4-4.1-1.4-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.3 11.3 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .4.2.7.8.6A11.5 11.5 0 0 0 12 .7Z"
              />
            </svg>
          </a>
          <a href="mailto:sefan@gmail.com" aria-label="Send an email">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M2 4.5h20v15H2v-15Zm2.1 2 7.9 6.1 7.9-6.1H4.1ZM20 17.4V9l-8 6.2L4 9v8.4h16Z"
              />
            </svg>
          </a>
          <a
            href="https://www.linkedin.com/"
            target="_blank"
            rel="noreferrer"
            aria-label="LinkedIn"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4.1 2.5A2.4 2.4 0 1 1 4 7.3a2.4 2.4 0 0 1 .1-4.8ZM2 9h4.2v13H2V9Zm6.8 0h4v1.8h.1c.6-1.1 2-2.3 4-2.3 4.3 0 5.1 2.8 5.1 6.5v7h-4.2v-6.2c0-1.5 0-3.4-2.1-3.4s-2.5 1.6-2.5 3.3V22H8.8V9Z"
              />
            </svg>
          </a>
        </div>
      </div>
    </nav>
  </div>
</header>
